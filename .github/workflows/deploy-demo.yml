name: Deploy Astro demo sites (GitHub Pages)

# Builds the four flavored demo sets and the gallery landing page:
#
#   /            ← demos/gallery/index.html
#   /aquarium/   ← demos/aquarium (Rocky Cove Aquarium Club, canonical)
#   /foodie/     ← demos/foodie (Lucky Town Foodie Club)
#   /kdrama/     ← demos/kdrama (KDrama Fan Club)
#
# The theme's internal links are root-absolute (clean for adopters, who deploy
# at a domain root). For the subpath demo deployment we post-process the built
# HTML, rewriting root-absolute href/src to the demo subpath.
#
# Enable Pages first: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build all demos
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          mkdir -p public
          for slug in aquarium foodie kdrama superfan; do
            node scripts/use-demo.mjs "$slug"
            npx astro build
            # Rewrite root-absolute URLs to the demo subpath
            find dist -name '*.html' -print0 | xargs -0 sed -i \
              -e "s| href=\"/| href=\"$BASE_PATH/$slug/|g" \
              -e "s| src=\"/| src=\"$BASE_PATH/$slug/|g" \
              -e "s| content=\"/| content=\"$BASE_PATH/$slug/|g"
            mv dist "public/$slug"
          done
          cp demos/gallery/index.html public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
