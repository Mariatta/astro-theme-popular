# Phase 1 of PACKAGING.md: build the packaged theme's smoke consumer and
# keep the transitional copies (src/ template model vs package/) identical.
name: Package smoke build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    # theme-repo only: forks inherit this file but must not run it
    if: github.repository == 'Mariatta/astro-theme-popular'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Transitional drift guard (template model vs package)
        run: |
          # Until the phase-4 cutover, theme code exists twice in this repo.
          # The package copies must match the canonical src/ + public/ files:
          # byte-identical for styles/scripts, identical after normalizing the
          # config import (src uses ../config, the package uses popular:config).
          diff -r src/styles package/src/styles
          diff -r public/scripts package/scripts
          norm() {
            mkdir -p "/tmp/norm/$2"
            (cd "$1" && find . -type f | while read -r f; do
              mkdir -p "/tmp/norm/$2/$(dirname "$f")"
              sed -E "s#from '(\.\./)+config'#from 'THEME_CONFIG'#; s#from 'popular:config'#from 'THEME_CONFIG'#" "$f" > "/tmp/norm/$2/$f"
            done)
          }
          # BaseLayout.astro is the one designed divergence: the package
          # version has no static /scripts tags (the integration injects
          # them); mirror edits to it by hand, everything else must match.
          for d in components layouts pages lib; do
            rm -rf /tmp/norm; norm "src/$d" a; norm "package/src/$d" b
            diff -r -x BaseLayout.astro /tmp/norm/a /tmp/norm/b
          done
      - name: Install the package's own dependencies
        # the smoke consumer links the package via file:, so the package's
        # deps (@astrojs/rss) must be installed at its real path
        working-directory: package
        run: npm ci
      - name: Build the smoke consumer
        working-directory: smoke
        run: |
          npm ci
          npx astro build
      - name: Output guards
        run: |
          python3 scripts/check-image-alt.py smoke/dist
          if grep -rl --include='*.html' '&amp;amp;' smoke/dist; then
            echo "::error::double-escaped ampersand in smoke output"; exit 1
          fi
          # rest params: a folder-organized content id must build
          test -f smoke/dist/speakers/2026-summit/nested-guest/index.html
          # nested page renders a back-link labeled by the parent's shortTitle
          grep -q 'fa-arrow-left.*</i> Policies' smoke/dist/policies/conduct/index.html
          # organizer profile page renders the persona/bio card
          grep -q 'g-persona' smoke/dist/organizers/sam/index.html
          # @count:<section> stat resolves to a live number (starter has 1 post)
          grep -qE 'g-stat__n">1</div><div class="g-stat__l">posts' smoke/dist/index.html
          # SEO: robots.txt + sitemap emitted, og:locale present
          grep -q 'Sitemap:' smoke/dist/robots.txt
          test -f smoke/dist/sitemap-index.xml
          grep -q 'og:locale' smoke/dist/index.html
      - name: Route opt-outs build
        working-directory: smoke
        run: |
          npx astro build --config astro.optout.config.mjs
          test ! -d dist-optout/speakers
          test ! -d dist-optout/venues
          test ! -f dist-optout/rss.xml
          test -d dist-optout/events
          test ! -d dist-optout/organizers
      - name: Renamed sections build
        working-directory: smoke
        run: |
          npx astro build --config astro.sections.config.mjs
          # byline resolves from the organizers collection, links there
          grep -q '/organizers/sam/' dist-sections/blog/hello-world/index.html
